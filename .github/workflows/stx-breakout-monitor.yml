name: STX Scheduler

on:
  schedule:
    - cron: '*/5 1-6 * * 1-5'
  workflow_dispatch:

concurrency:
  group: stx-scheduler
  cancel-in-progress: false

jobs:
  run-stx-scheduler:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Call STX scheduler API
        env:
          STX_API_BASE: ${{ secrets.STX_API_BASE }}
        run: |
          API_BASE="${STX_API_BASE:-https://stock-monitor-b6d6.onrender.com}"
          echo "Calling ${API_BASE}/api/cron-run"
          curl --fail --show-error --silent --max-time 540 \
            "${API_BASE}/api/cron-run"
          echo ""
          echo "STX scheduler completed."
