name: STX Scheduler

on:
  schedule:
    - cron: '2-57/5 1-6 * * 1-5'
  workflow_dispatch:

concurrency:
  group: stx-scheduler
  cancel-in-progress: false

jobs:
  run-stx-scheduler:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Call STX scheduler API
        env:
          STX_API_BASE: ${{ secrets.STX_API_BASE }}
        run: |
          API_BASE="${STX_API_BASE:-https://stock-monitor-b6d6.onrender.com}"

          TW_NOW="$(TZ=Asia/Taipei date '+%Y-%m-%d %H:%M:%S')"
          TW_DAY="$(TZ=Asia/Taipei date '+%u')"
          TW_HHMM="$(TZ=Asia/Taipei date '+%H%M')"

          echo "Taiwan time: ${TW_NOW}"

          if [ "$TW_DAY" -gt 5 ]; then
            echo "Not a Taiwan trading day. Scheduler skipped."
            exit 0
          fi

          if [ "$TW_HHMM" -lt "0900" ] || [ "$TW_HHMM" -gt "1455" ]; then
            echo "Outside Taiwan trading time. Scheduler skipped."
            exit 0
          fi

          echo "Calling ${API_BASE}/api/cron-run"
          curl --fail --show-error --silent --max-time 540 \
            "${API_BASE}/api/cron-run"
          echo ""

          echo "Waiting for GitHub performance log sync"
          sleep 20

          echo "Calling ${API_BASE}/api/performance-auto-update"
          curl --fail --show-error --silent --max-time 540 \
            "${API_BASE}/api/performance-auto-update"
          echo ""

          echo "STX scheduler and performance update completed."
