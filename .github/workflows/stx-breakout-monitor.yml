name: STX Breakout Monitor

on:
  schedule:
    - cron: '*/5 1-6 * * 1-5'
  workflow_dispatch:

jobs:
  scan-breakouts:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Call STX breakout alert API
        env:
          STX_API_BASE: ${{ secrets.STX_API_BASE }}
        run: |
          API_BASE="${STX_API_BASE:-https://stock-monitor-b6d6.onrender.com}"
          echo "Calling ${API_BASE}/api/breakout-alerts"
          curl --fail --show-error --silent --max-time 240 \
            "${API_BASE}/api/breakout-alerts?limit=20&min_score=85&send=true"
