name: STX Scheduler

on:
  workflow_dispatch:

concurrency:
  group: stx-scheduler
  cancel-in-progress: false

jobs:
  run-stx-scheduler:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Call STX external cron tick API
        env:
          STX_API_BASE: ${{ secrets.STX_API_BASE }}
        run: |
          API_BASE="${STX_API_BASE:-https://stock-monitor-b6d6.onrender.com}"

          echo "Calling ${API_BASE}/api/cron-tick?force=true"
          curl --fail --show-error --silent --max-time 540 \
            "${API_BASE}/api/cron-tick?force=true"
          echo ""

          echo "Manual STX scheduler completed."
