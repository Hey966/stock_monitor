<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#06101f" />
  <title>STX 多因子當沖系統</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="pro.css?v=build-001" />
</head>
<body class="pro-body modern-body">
  <main class="pro-app modern-app">
    <header class="modern-header">
      <button id="openSearchPage" class="modern-icon">‹</button>
      <div class="modern-title-wrap"><strong id="proTitle">STX 當沖主介面</strong><span>大盤分析｜搜尋股票</span></div>
      <div class="modern-top-actions"><button id="marketRefresh" class="modern-star">↻</button><button class="modern-more">⋮</button></div>
    </header>
    <section class="modern-price-head"><div class="modern-price-main"><strong id="proPrice" class="pro-price">-</strong><span id="proChange">請先搜尋股票</span></div><div id="stockCodeLabel" class="stock-code-label">搜尋</div></section>
    <section id="page-search" class="modern-page active"><h2 class="page-heading">搜尋主介面</h2><section class="market-hero"><div><span>加權指數</span><strong id="marketIndex">-</strong><p id="marketChange" class="up">等待更新</p></div><div class="market-score"><b id="marketScore">-</b><span>大盤強度</span></div></section><section class="search-panel"><span>搜尋股票代號</span><div class="watch-input"><input id="proCode" inputmode="numeric" value="" placeholder="例如 2330" /><button id="proSearch">查詢</button></div><p id="marketSummary">依當沖教材規則分析大盤與個股強弱。</p></section><section class="market-grid terminal-grid"><article><span>盤勢判斷</span><strong id="marketMood">等待資料</strong><p>分析中</p></article><article><span>當沖環境</span><strong id="daytradeMood">等待資料</strong><p>分析中</p></article><article><span>核心規則</span><strong>回測不破</strong><p>不追第一根急拉</p></article><article><span>風險提醒</span><strong>先看主力</strong><p>再看技術指標</p></article></section></section>
    <section id="page-overview" class="modern-page"></section>
    <section id="page-quote" class="modern-page"></section>
    <section id="page-watch" class="modern-page"></section>
    <section id="page-analysis" class="modern-page"></section>
    <section id="page-radar" class="modern-page"></section>
    <section id="page-plan" class="modern-page"></section>
    <div class="app-version">STX build-001 PWA</div>
    <nav class="pro-bottom-nav modern-bottom"><button data-page="overview">⌂<br>總覽</button><button data-page="quote">▧<br>報價</button><button data-page="analysis">◴<br>分析</button><button data-page="radar">◎<br>雷達</button><button data-page="plan">▣<br>計畫</button></nav>
  </main>
  <script src="daytrade-source.js?v=build-001"></script>
  <script src="stx-core-v2.js?v=build-001"></script>
  <script src="overview-home-fix.js?v=build-001"></script>
  <script src="signal-addon.js?v=build-001"></script>
  <script src="news-addon.js?v=build-001"></script>
  <script src="chips-addon.js?v=build-001"></script>
  <script src="fusion-addon.js?v=build-001"></script>
  <script src="alert-addon.js?v=build-001"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./service-worker.js');
    }
  </script>
</body>
</html>
